name: Continuous integration
on: push
jobs:
  code_check:
    name: Code check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v3
    - uses: pre-commit/action@v3.0.1
      env:
        SKIP: 'no-commit-to-branch'

  pyqt6-check:
    name: PyQt6 compatibility check
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/qgis/pyqgis4-checker:main-ubuntu
    steps:
      - name: Get source code
        uses: actions/checkout@v6

      - name: Check PyQt5 to PyQt6 compatibility
        run: |
          pyqt5_to_pyqt6.py --dry_run libqfieldsync/
          pyqt5_to_pyqt6.py --logfile pyqt6_checker.log libqfieldsync/

      - name: Upload script report if script fails
        uses: actions/upload-artifact@v7
        if: ${{ failure() }}
        with:
          name: pyqgis4-checker-report
          path: pyqt6_checker.log
          retention-days: 7

  test:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        # TODO @suricactus: enable QGIS 4 tests
        qgis_version: ["3.40", "3.44", "ltr"]
    env:
      QGIS_TEST_VERSION: ${{ matrix.qgis_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Run tests
        run: |
          docker build -f .docker/Dockerfile --build-arg QGIS_TEST_VERSION=$QGIS_TEST_VERSION -t libqfieldsync-test .
          docker run --rm libqfieldsync-test .docker/run-docker-tests.sh

  test_packaging:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v6
          with:
            submodules: recursive

        - name: Setup Python
          uses: actions/setup-python@v6

        - name: Install uv with all available options
          uses: astral-sh/setup-uv@v8.1.0

        - name: Package with uv
          run:  uv build

        - name: Install with pip
          run: pip install . --break-system-packages
